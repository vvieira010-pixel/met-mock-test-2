<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Why MET visual</title>
  <desc id="desc">Navy and teal chart bars with B1 B2 C1 levels, checklist board, and upward arrow for exam progress.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#f5fbfc"/>
      <stop offset="1" stop-color="#eef6f9"/>
    </linearGradient>
    <linearGradient id="barNavy" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a4d80"/>
      <stop offset="1" stop-color="#0f3258"/>
    </linearGradient>
    <linearGradient id="barTeal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1cb4b7"/>
      <stop offset="1" stop-color="#0f7f86"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0a2f4f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <ellipse cx="350" cy="420" rx="290" ry="190" fill="#dff2f3"/>

  <g filter="url(#shadow)">
    <rect x="130" y="470" width="170" height="240" rx="10" fill="url(#barNavy)"/>
    <rect x="315" y="390" width="190" height="320" rx="10" fill="url(#barTeal)"/>
    <rect x="525" y="250" width="210" height="460" rx="10" fill="url(#barNavy)"/>
  </g>

  <g fill="none" stroke="#ffffff" stroke-width="5">
    <circle cx="215" cy="560" r="56"/>
    <circle cx="410" cy="525" r="60"/>
    <circle cx="630" cy="360" r="65"/>
  </g>

  <g fill="#ffffff" stroke="#0b365d" stroke-width="2.4" paint-order="stroke" font-family="Calibri, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="215" y="576" font-size="60">B1</text>
    <text x="410" y="542" font-size="62">B2</text>
    <text x="630" y="378" font-size="66">C1</text>
  </g>

  <path d="M145 545 C300 500, 430 420, 620 210" fill="none" stroke="#1bb0b5" stroke-width="16" stroke-linecap="round"/>
  <path d="M620 210 l18 30 l-42 -2 z" fill="#1bb0b5"/>

  <g transform="translate(700,270)" filter="url(#shadow)">
    <rect x="0" y="0" width="390" height="500" rx="18" fill="#ffffff" stroke="#1a4d80" stroke-width="10"/>
    <rect x="80" y="-18" width="230" height="48" rx="10" fill="#1a4d80"/>
    <rect x="42" y="84" width="44" height="44" rx="8" fill="none" stroke="#1bb0b5" stroke-width="4"/>
    <path d="M52 106 l10 10 l17 -20" fill="none" stroke="#1bb0b5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="42" y="168" width="44" height="44" rx="8" fill="none" stroke="#1bb0b5" stroke-width="4"/>
    <path d="M52 190 l10 10 l17 -20" fill="none" stroke="#1bb0b5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="42" y="252" width="44" height="44" rx="8" fill="none" stroke="#1bb0b5" stroke-width="4"/>
    <path d="M52 274 l10 10 l17 -20" fill="none" stroke="#1bb0b5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="42" y="336" width="44" height="44" rx="8" fill="none" stroke="#b7c5d2" stroke-width="4"/>
    <rect x="120" y="96" width="220" height="12" rx="6" fill="#bcc9d6"/>
    <rect x="120" y="126" width="170" height="10" rx="5" fill="#ccd7e1"/>
    <rect x="120" y="180" width="215" height="12" rx="6" fill="#bcc9d6"/>
    <rect x="120" y="210" width="165" height="10" rx="5" fill="#ccd7e1"/>
    <rect x="120" y="264" width="200" height="12" rx="6" fill="#bcc9d6"/>
    <rect x="120" y="294" width="170" height="10" rx="5" fill="#ccd7e1"/>
    <rect x="120" y="348" width="230" height="12" rx="6" fill="#bcc9d6"/>
    <rect x="120" y="378" width="175" height="10" rx="5" fill="#ccd7e1"/>
  </g>

  <g font-family="Calibri, Arial, sans-serif" fill="#0c2340">
    <text x="700" y="820" font-size="58" font-weight="800">Why MET?</text>
    <text x="700" y="856" font-size="27" fill="#355873">Practical pathway for healthcare and professional goals</text>
  </g>
</svg>
